syntax = "proto3";

package aura.v1;

option go_package = "github.com/aura/controller/gen/aura/v1;aurav1";

// ===== 契约演进纪律（M6 起，additive-frame）=====
// aura.v1 对外契约只增不改：工具 / 字段 / RPC 演进一律 additive-within-aura.v1——
// 新字段接现有 message 尾号、新 RPC 接 service 尾、新 message 独立追加；零字段删除 / 零重编号
// （UploadUrlGrant、ErrorCode 的 M3 additive 扩展即先例）。proto 为哑管道，工具语义增长由 MCP
// JSON schema 承载，不触发 aura.v2 bump；快照 diff 判据沿 M3 惯例（前后 diff 仅新增行）。
// aura.v2 共存接缝「备而不建」：未来若确需破坏性演进，新 aurav2 connect service 可并挂同一 mux，
// 与 aura.v1 长期共存、按节点 contract_version 路由；此接缝仅作定性预留，本里程碑不落地
// （roadmap SC6 / roadmap:157）。

// 节点↔控制面反向双向流服务。
// 节点主动拨出建立长驻双向流（假设节点在 NAT/防火墙后，控制面从不回连节点）。
// 哑管道设计：gRPC 层只搬运传输信封，工具语义契约由 MCP JSON schema 单一承载
// （json_args / json_envelope 透传 aura-capability 的 Envelope），proto 不结构化重定义 16 工具。
service NodeControl {
  // 节点拨出建立的长驻双向流。
  // 上行（NodeToController）首帧必为 Register，之后周期 Heartbeat + 按需 ToolResponse。
  // 下行（ControllerToNode）为 RegisterAck 与控制面下发的 ToolRequest。
  rpc Connect(stream NodeToController) returns (stream ControllerToNode);
}

// 管理面服务（connect-go 同库暴露，走 :18080 TLS+bearer；节点流走 :7443 mTLS）。
// auractl / agent 经此列节点、下发工具、管理环境生命周期。
service ControllerAdmin {
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc DispatchTool(DispatchToolRequest) returns (DispatchToolResponse);
  rpc CreateEnvironment(CreateEnvironmentRequest) returns (CreateEnvironmentResponse);
  rpc DestroyEnvironment(DestroyEnvironmentRequest) returns (DestroyEnvironmentResponse);
  // M6 录制回放控制面（additive）。StartTrace 即对 node 建 per-node 独占租约并返回 trace_id；
  // StopTrace / TTL 释放；GetTrace 分页读回步序（步数×envelope 可超 connect max-recv-bytes，分页保 contract 干净）。
  rpc StartTrace(StartTraceRequest) returns (StartTraceResponse);
  rpc StopTrace(StopTraceRequest) returns (StopTraceResponse);
  rpc GetTrace(GetTraceRequest) returns (GetTraceResponse);
}

// ===== 反连双向流消息 =====

// 上行帧（节点 → 控制面）。
message NodeToController {
  oneof payload {
    Register register = 1;
    Heartbeat heartbeat = 2;
    ToolResponse tool_response = 3;
    UploadComplete upload_complete = 4;  // M3：大产物旁路 HTTP PUT 上传完成回执（additive）
    UploadFailed upload_failed = 5;      // M10：旁路上传失败即时通知（additive，UploadComplete 对偶帧）
    AgentActivity agent_activity = 6;    // M13：直连 MCP agent 活动批量上报（additive；观测帧，不影响工具执行链）
    McpProxyResponse mcp_proxy_response = 7;  // M14：MCP 网关代理响应（additive，request_id 关联 McpProxyRequest）
  }
}

// 下行帧（控制面 → 节点）。
message ControllerToNode {
  oneof payload {
    RegisterAck register_ack = 1;
    ToolRequest tool_request = 2;
    UploadUrlGrant upload_url_grant = 3;  // M3：大产物旁路上传预签名 URL 授权（additive）
    McpProxyRequest mcp_proxy_request = 4;  // M14：控制面 MCP 网关代理请求（additive；未滚更节点安全忽略未知帧，网关侧超时可辨）
  }
}

// ===== M14：控制面 MCP 网关代理（additive） =====
//
// agent → controller `/v1/mcp/<node_id>`（TLS + bearer）→ 本帧对经反连流送达节点 → 节点自环 POST
// 本机 `/mcp`（rmcp Streamable HTTP 面）→ 响应原样回传。控制面与反连层均不解释 MCP 协议
// （哑管道纪律）：initialize/tools/list/tools/call 的语义、schema、版本协商全部由节点 rmcp 面单一承载，
// 网关语义与 agent 直连节点严格一致。定位：跨网/生产接入的唯一对外入口（节点 /mcp 可只绑 loopback）。

// 控制面 → 节点：一次 MCP JSON-RPC 请求的代理封装。
message McpProxyRequest {
  string request_id = 1;        // 网关生成的关联 id（响应帧回传；与 ToolRequest.task_id 同纪律）
  bytes body = 2;               // 原始 JSON-RPC 请求体（透传不解释）
  string content_type = 3;      // 原请求 Content-Type（空 = application/json）
  string accept = 4;            // 原请求 Accept（空 = application/json, text/event-stream）
  string user_agent = 5;        // 原请求 User-Agent（透传保 M13 接入观测的 client 辨识语义）
  string protocol_version = 6;  // 原请求 MCP-Protocol-Version 头（空 = 未携带）
}

// 节点 → 控制面：代理请求的响应封装。
message McpProxyResponse {
  string request_id = 1;
  int32 status = 2;             // 节点本地 /mcp 的 HTTP 状态码；自环失败 502、http 传输未启用 503
  bytes body = 3;               // 响应体原样（JSON-RPC response / 错误文本）
  string content_type = 4;      // 响应 Content-Type（网关原样回传 agent）
}

// 节点注册（流首帧）。node_id 为空表示首次注册，控制面分配 UUID 经 RegisterAck 回传；
// 禁用机器指纹（PVE clone 共享 machine-id 会趋同），身份以控制面分配 UUID 为准。
message Register {
  string node_id = 1;         // 空=首次；非空=重连（携已分配 UUID）
  string platform = 2;        // windows | linux | macos | android（driver 派生）
  string token = 3;           // 一次性 bootstrap/enrollment token
  repeated string tools = 4;  // 节点支持的工具名清单
  string contract_version = 5;  // M6：节点契约版本（供 NodeInfo.contract_version 回填 + 偏斜告警，additive）
  string name = 6;            // M12：节点自报 hostname（可读辨识，替代裸 UUID；additive）
  string label = 7;           // M12：用户标签（分组/筛选；节点自报默认空，console 编辑回填；additive）
  string location = 8;        // M12：用户位置（节点自报默认空，console 编辑回填；additive）
  string network_zone = 9;    // M12：节点探测上报的可达网络域（presigned 分派用，TASK-007 探测；additive）
  // M12 批B（节点元数据扩展，additive）：节点自报系统辨识信息，controller 回填 NodeInfo 供 console 渐进披露。
  string os_version = 10;     // 节点采集的简短系统版本（Linux /etc/os-release NAME+VERSION_ID / Win ver build 映射 / mac sw_vers）
  string ip_address = 11;     // 节点采集的主内网网卡 IP（UDP-connect controller 取源 IP）；controller 仅内存会话回填，不入库（敏感）
  // M12 批D（基础设施标注，additive）：节点自报运行形态/宿主链/派生服务，定位基础设施（离线时最需要，故入库）。
  string runtime_kind = 12;   // 运行形态（node 自动探测）：k8s | container | vm | baremetal；探测失败兜底 baremetal，宁兜底勿错报
  string infra_host = 13;     // 宿主链（斜杠编码 "<host>[/<ns>/<pod>]"）：k8s=downward API 节点名+ns/pod；vm/baremetal=自身 hostname；container=env AURA_INFRA_HOST 兜底（空则空）
  string attached = 14;       // 该节点驱动/派生的服务（如 "redroid@localhost:5555"、"selkies-desktop@DISPLAY=:20"）：driver 配置自动拼，env AURA_ATTACHED 优先覆写；桌面裸机空=自身即设备
  // 批E（滚更可见性，additive）：节点二进制版本自报（CARGO_PKG_VERSION）。此前版本偏斜仅
  // auractl stderr 可见，无法从 console/API 盘点舰队滚更进度；随 Register 落 nodes 表（离线也可查
  // 最后已知版本，同 runtime_kind 持久语义）。
  string node_version = 15;   // 节点二进制版本（aura-node CARGO_PKG_VERSION；未滚更节点空）
}

// 注册确认。控制面回传最终 node_id（首次注册时为新分配的 UUID）。
message RegisterAck {
  string node_id = 1;
  bool accepted = 2;
  string message = 3;
}

// 心跳（应用层，驱动控制面 unhealthy 判定；不依赖 TCP，规避 h2 半开连接）。
message Heartbeat {
  string node_id = 1;
  int64 ts_unix_ms = 2;
}

// 工具调用请求（控制面 → 节点，哑管道）。
message ToolRequest {
  string task_id = 1;
  string tool = 2;          // 工具名（screenshot / click / run_command / ...）
  bytes json_args = 3;      // MCP 工具入参 JSON（透传，不在 proto 层解释）
  int64 deadline_ms = 4;    // 相对超时；节点强制执行，控制面兜底 timer
  string trace_id = 5;      // M6：录制会话标识穿透至节点（空=非录制；additive，节点默认忽略）
}

// 工具调用响应（节点 → 控制面）。
message ToolResponse {
  string task_id = 1;
  bytes json_envelope = 2;  // aura-capability Envelope{ok,data,error} JSON（原样回传）
}

// ===== 大产物旁路上传（M3，additive）=====

// 大产物旁路上传授权（控制面 → 节点）。
// >16MB 产物（录屏 / 大 file_pull）绕开双向流 16MB 内联上限：控制面经节点可达端点签发预签名
// PUT URL，节点直连对象存储 HTTP PUT 上传，避免大字节流经反连流。哑管道信封外的控制帧。
message UploadUrlGrant {
  string key = 1;            // 对象存储键（桶内路径）
  string presigned_url = 2;  // 预签名 PUT URL（节点可达端点签发，有限期）
  int64 ttl_secs = 3;        // URL 有效期（秒）；节点须在期内完成 PUT
}

// 大产物旁路上传完成回执（节点 → 控制面）。
message UploadComplete {
  string key = 1;   // 对象存储键（回声授权中的 key）
  string etag = 2;  // 对象存储返回的 ETag（上传完整性凭据）
}

// 大产物旁路上传失败即时通知（节点 → 控制面，M10 additive）。
// 节点旁路 PUT 失败时 best-effort 上报，令控制面 awaitUpload 提前唤醒、gateway 即时降级
// （免等满兜底超时窗）；UploadComplete 的对偶帧。帧丢失 / 旧节点无此帧时，控制面
// awaitUploadTimeout 兜底超时仍独立生效（两案纵深，非二选一）。
message UploadFailed {
  string key = 1;    // 对象存储键（回声授权中的 key）
  string error = 2;  // 节点侧失败原因（诊断文本，anyhow cause 链单行展开）
}

// ===== 直连 MCP agent 活动观测（M13，additive）=====
// 外部 coding agent（Claude Code / Codex / Gemini / OpenCode）直连节点 /mcp（Streamable HTTP）时，
// 此路径原本 controller/console 完全不可见（区别于经 controller 转发的 DispatchTool 审计路径）。
// 节点侧 /mcp axum 观测中间件采集每次 POST 的方法/工具/客户端/时延/结果，批量（时间窗或条数触发）
// 经既有反连流上报，controller 落库（agent_calls/agent_sessions）供 console「接入观测」页消费。
// 哑管道外的观测帧：与工具执行链正交，best-effort（有界通道满即丢弃，绝不阻塞 MCP 请求）。

// 一批 MCP 交互事件（节点 /mcp 中间件积攒后批量上报，减少反连流帧数）。
message AgentActivity {
  repeated AgentCallEvent events = 1;
}

// 单次 MCP 交互事件（节点 /mcp 观测中间件采集，一次 POST 一条）。
message AgentCallEvent {
  string peer = 1;              // 客户端 peer 地址（ip:port；NAT 后为出口地址）
  string method = 2;           // JSON-RPC 方法：initialize | tools/call | tools/list | notifications/initialized | ...
  string tool = 3;             // 工具名（method=tools/call 时填；否则空）
  string client_name = 4;      // 客户端标识（initialize 帧 clientInfo.name，如 claude-code / codex；否则空）
  string client_version = 5;   // 客户端版本（initialize 帧 clientInfo.version；否则空）
  string protocol_version = 6; // MCP 协议版本（initialize 帧协商值；否则空）
  int64 duration_ms = 7;       // 本次请求处理耗时（毫秒）
  bool ok = 8;                 // 传输层成功（HTTP 2xx；工具层/JSON-RPC 层错误在响应体内、不细析——见 node agent_obs 注释）
  string transport = 9;        // 传输类型：http（stdio 为本地开发场景、无反连流承载，暂不观测）
  int64 ts_unix_ms = 10;       // 事件时刻（毫秒）
}

// ===== 错误码 =====

// 镜像 aura-capability CapError::code()（node/crates/aura-capability/src/types.rs 为规范源），
// 加 M2 反连/调度新增码。传输层错误用此枚举；工具语义错误仍在 json_envelope.error.code 内。
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  E_NODE_OFFLINE = 1;      // 节点离线/未注册
  E_COORD_OOB = 2;
  E_CAPTURE_FAILED = 3;
  E_INPUT_FAILED = 4;
  E_PROCESS_FAILED = 5;
  E_FILE_FAILED = 6;
  E_INVALID_ARG = 7;
  E_UNSUPPORTED = 8;
  E_INTERNAL = 9;
  E_BUSY = 10;             // M2：per-node 串行队列满
  E_TIMEOUT = 11;          // M2：控制面兜底 timer 超时
}

// ===== 管理面消息 =====

message ListNodesRequest {}

message NodeInfo {
  string node_id = 1;
  string platform = 2;
  string status = 3;        // online | unhealthy | offline
  int64 last_seen_ms = 4;
  repeated string tools = 5;      // M6：节点能力子集（fleet 面回填，additive）
  string contract_version = 6;    // M6：节点契约版本（fleet 面回填 + 偏斜告警，additive）
  string name = 7;                // M12：节点可读名（自报 hostname / label 回填，fleet 面替代裸 UUID；additive）
  string label = 8;               // M12：用户标签（分组/筛选，nodes 表持久；additive）
  string location = 9;            // M12：用户位置（nodes 表持久；additive）
  // ===== M12 批B（节点元数据扩展，additive）：辨识度增强，console 渐进披露 =====
  string os_version = 10;         // 节点自报简短系统版本（node 采集「Windows 11」/「Ubuntu 22.04」/「macOS 26」）；在线会话回填，离线空
  string ip_address = 11;         // 节点自报主内网 IP（node 采集主网卡）；在线会话回填，离线空——敏感，controller 仅内存回填不入库
  string network_zone = 12;       // 节点可达网络域（controller 回填：在线取会话 NetworkZone、离线取 nodes 表 network_zone 列）
  int64 connected_at_ms = 13;     // 当前会话建立时刻（毫秒，controller 会话建时设）；console 算 now−此=本次在线时长；离线 0
  // ===== M12 批D（基础设施标注，additive）：形态/宿主链/派生服务——定位基础设施在节点离线时最需要，
  // 故不同于 os/ip 的 session-only：三字段随 Register 落 nodes 表，离线节点经 ListNodes 表分支回填。=====
  string runtime_kind = 14;       // 运行形态：k8s | container | vm | baremetal（node 自动探测；未滚更节点空）
  string infra_host = 15;         // 宿主链（"<host>[/<ns>/<pod>]" 斜杠编码，console parse 展示所属链）
  string attached = 16;           // 该节点驱动/派生的服务（redroid@serial / selkies-desktop@DISPLAY 等；空=自身即设备）
  // 批E（滚更可见性，additive）：节点二进制版本（Register.node_version=15 落库回填；离线节点经
  // ListNodes 表分支回填最后已知版本——盘点舰队滚更进度恰需覆盖离线成员）。
  string node_version = 17;       // 节点二进制版本（CARGO_PKG_VERSION；未滚更/未上报空）
  // M15（项目隔离，additive）：节点项目归属。console 管理面赋值（UpdateNodeMeta / enroll token 携带），
  // 非节点自报——区别于 label 的双写方语义，本字段单写方（管理面权威）。空=未归属（仅全域令牌可见可控）。
  string project = 18;            // 项目归属（''=未归属；项目令牌仅见/仅控同值节点）
}

message ListNodesResponse {
  repeated NodeInfo nodes = 1;
}

// 经控制面转发工具调用到指定节点（REST → gRPC stream）。
message DispatchToolRequest {
  string node_id = 1;
  string tool = 2;
  bytes json_args = 3;
  int64 deadline_ms = 4;
  string who = 5;           // 审计：调用方标识
  string trace_id = 6;      // M6：录制会话调用方标识（空=非录制；沿 who 同款路径穿透 additive）
}

message DispatchToolResponse {
  bytes json_envelope = 1;  // 节点 ToolResponse.json_envelope 原样回传
}

message CreateEnvironmentRequest {
  string kind = 1;          // ephemeral | persistent
  string template = 2;      // 模板名/VMID（空=默认模板）
}

message CreateEnvironmentResponse {
  string env_id = 1;
  int32 vmid = 2;
  string node_id = 3;       // 环境内节点注册后的 UUID
}

message DestroyEnvironmentRequest {
  string env_id = 1;
}

message DestroyEnvironmentResponse {
  bool destroyed = 1;
}

// ===== 录制回放管理面（M6，additive）=====

// 开始录制：对 node_id 建立 per-node 独占租约并返回 trace_id。
// 租约期间非持有者 dispatch 拒以 E_BUSY（复用枚举零新码）；StopTrace 或 TTL 超时释放。
message StartTraceRequest {
  string node_id = 1;
  string who = 2;             // 录制会话持有者标识（审计 + 租约归属）
}

message StartTraceResponse {
  string trace_id = 1;        // 新建租约的录制会话标识
}

// 停止录制：释放 trace_id 对应的 per-node 租约。
message StopTraceRequest {
  string trace_id = 1;
}

message StopTraceResponse {
  bool stopped = 1;           // 是否成功释放（trace_id 不存在 / 已释放则 false）
}

// 读取录制步序（回放读路径）。分页 additive：步数×envelope 体积可超 connect 默认 max-recv-bytes，
// 倾向分页保 contract 干净而非 raise max-recv-bytes。
message GetTraceRequest {
  string trace_id = 1;
  int64 page_size = 2;        // 单页步数上限（0=服务端默认）
  string page_token = 3;      // 上页末 seq 的字符串编码（空=首页）
}

message GetTraceResponse {
  repeated TraceStep steps = 1;
  string node_id = 2;         // 录制源节点（回放目标定位用）
  string platform = 3;        // 录制源平台（同 platform best-effort 回放用）
  string next_page_token = 4; // 下页游标（空=末页）
}

// 单条录制步（回放读路径载体）。
message TraceStep {
  int64 seq = 1;              // per-trace 单调递增序号（保序回放）
  string tool = 2;            // 工具名
  bytes json_args = 3;        // 录制时 MCP 工具入参 JSON（回放逐字重发）
  bytes json_envelope = 4;    // 录制时节点回执 Envelope JSON（持久化前已剥离内联截图，a11y 存在谓词依据）
  string screenshot_key = 5;  // 逐步截图卸桶 key（trace/<trace_id>/<seq>.webp；空=无截图）
  int64 ts_unix_ms = 6;       // 录制时刻（毫秒）
}
