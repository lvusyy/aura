version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  except:
    # E_* 错误码须逐字镜像 aura-capability 的机器码，不加 ENUM 名前缀。
    - ENUM_VALUE_PREFIX
    # 反连双向流帧按方向命名（NodeToController/ControllerToNode）比 ConnectRequest/Response 更表意；
    # 服务名 NodeControl/ControllerAdmin 为领域命名，不加 Service 后缀。
    - SERVICE_SUFFIX
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
