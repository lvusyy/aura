name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  controller:
    name: controller (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: controller
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: controller/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  console:
    name: console (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: console/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  node:
    name: node (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4
      # 系统依赖：protoc（build.rs tonic 反连 codegen）、enigo 的 libxdo、xcap 的 X11/xcb 面、
      # xvfb（headless 跑图形相关单测的虚拟显示器）。包名在 22.04/24.04 稳定。
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler libxdo-dev libx11-dev libxi-dev libxtst-dev \
            libxrandr-dev libxfixes-dev libxcb-shm0-dev libxcb-randr0-dev \
            libdbus-1-dev libgbm-dev xvfb
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: node
      # 生产 feature 集（grpc,enroll,otel）——反连/enroll/otel 面均 cfg 门控，裸构建编不到，
      # 且反连流的 cfg(test) 单测（ReverseConfig 等）只有带 feature 才参与编译（release build 不编测试，
      # 曾漏过一次字段缺失，故 CI 必带 test 编译）。
      - name: Build (production features)
        run: cargo build -p aura-node --features grpc,enroll,otel
      # xvfb 提供虚拟显示器供图形相关单测；-a 自动挑 display 号。
      - name: Test
        run: xvfb-run -a cargo test -p aura-node --features grpc,enroll,otel

  # 端到端回归（M16 T1.1/T1.2）：起真 controller + 真 aura-node，经 mTLS 反连 + REST 管理面跑完整链路。
  # 独立 job——重（构建两二进制 + PG service + xvfb 桌面），失败不掩盖单元 job 的快速反馈。
  e2e:
    name: e2e (controller + node)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aura
          POSTGRES_USER: aura
          POSTGRES_PASSWORD: aura
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U aura -d aura"
          --health-interval 5s --health-timeout 3s --health-retries 12
    steps:
      - uses: actions/checkout@v4
      # 系统依赖：node 图形/反连构建链（同 node job）+ e2e 桌面（xvfb 虚拟屏 + openbox WM + xterm，
      # UI 闭环场景需真窗口管理器给 xterm 焦点与 geometry）。
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler libxdo-dev libx11-dev libxi-dev libxtst-dev \
            libxrandr-dev libxfixes-dev libxcb-shm0-dev libxcb-randr0-dev \
            libdbus-1-dev libgbm-dev xvfb openbox xterm x11-utils
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: controller/go.sum
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: node
      # 生产 feature 集：enroll（换证子命令）+ grpc（反连）+ otel。release 构建供 e2e 起真节点。
      - name: Build aura-node
        working-directory: node
        run: cargo build --release -p aura-node --features grpc,enroll,otel
      # 虚拟桌面：Xvfb 建 :99 屏 + openbox 供窗口管理（xterm 焦点/geometry）；DISPLAY 传给 e2e。
      - name: Start virtual desktop
        run: |
          Xvfb :99 -screen 0 1280x720x24 -ac >/tmp/xvfb.log 2>&1 &
          for i in $(seq 1 20); do xdpyinfo -display :99 >/dev/null 2>&1 && break; sleep 0.5; done
          DISPLAY=:99 openbox >/tmp/openbox.log 2>&1 &
          sleep 1
      # M16 场景⑥ MinIO（self-update 制品存储）：services 键不支持 command 覆写而 minio 镜像需
      # `server /data`，故 docker run 起临时实例；健康探针等就绪。
      - name: Start MinIO
        run: |
          docker run -d --name e2e-minio -p 9000:9000 \
            -e MINIO_ROOT_USER=aura -e MINIO_ROOT_PASSWORD=aura-e2e-minio \
            minio/minio server /data
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null && break; sleep 1; done
      - name: Run e2e suite
        working-directory: controller
        env:
          DISPLAY: ":99"
          AURA_E2E_PG_DSN: "postgres://aura:aura@127.0.0.1:5432/aura?sslmode=disable"
          AURA_E2E_NODE_BIN: "${{ github.workspace }}/node/target/release/aura-node"
          AURA_E2E_MINIO_ENDPOINT: "127.0.0.1:9000"
          AURA_E2E_MINIO_ACCESS_KEY: "aura"
          AURA_E2E_MINIO_SECRET_KEY: "aura-e2e-minio"
        run: go test -tags e2e -v -timeout 10m ./e2e/...
