name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  controller:
    name: controller (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: controller
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: controller/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  console:
    name: console (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: console/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
