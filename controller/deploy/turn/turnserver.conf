# AURA M8-P2 coturn TURN 服务端最小配置（备用件 / fallback，不 gate 流架构主线）。
#
# 来源：research.md §3（REST 时限凭证最小配置，[HIGH] 置信）。
# 定位：第三方 harness 进程供给——coturn 属部署 harness 拥有的进程，非 AURA 编排面代码。
#       主线为 Selkies hostNetwork ICE 直连（见 evidence/spike-verdict.md：GATE=DIRECT_OK）；
#       本 coturn 仅当 UDP 直连不可用时由 TASK-004 经 SELKIES_TURN_* 注入启用。
#
# static-auth-secret 刻意不写入本文件：部署期经 k8s Secret 以 --static-auth-secret CLI 注入
# （见 coturn-deploy.yaml），随机密钥留存于 .workflow evidence，不入库。

realm=aura.internal
listening-port=3478
# TLS/DTLS（TURNS 5349）默认不启：本部署经 Tailscale（WireGuard）已提供传输层加密，
# 且未随附证书。若需公网 TURNS，放开并挂载 turn_server_cert.pem/turn_server_pkey.pem。
#tls-listening-port=5349

# relay 段收窄（每并发占一端口；research §3 确认可行）。
min-port=49160
max-port=49200

# REST 时限凭证鉴权：username=<到期 unix 时间戳>，password=base64(HMAC-SHA1(secret, username))。
use-auth-secret

# relay 通告 Tailscale 交汇点 IP，使浏览器（100.x 段）可达 relayed candidate。
# analysis §3.5-A：UDP 不通时 TASK-004 走 coturn relay，advertise <host-tailscale-ip>。
relay-ip=<host-tailscale-ip>

# 收窄与协议约束。
no-tcp-relay
fingerprint
# coturn 4.14 起 telnet 管理 CLI 默认关闭，旧 no-cli 已废弃（会打 deprecated 日志），故不再声明。

# 日志走 stdout，使 `kubectl logs coturn` 可观测（覆盖官方镜像默认 args 后需显式声明）。
log-file=stdout

# 客户端腿被段间 ACL 封 UDP 时启用（强制 TCP/TLS，禁 STUN 为已知副作用）；
# 绝不启用 no-udp-relay（会断内网 relay->媒体对端的 UDP）。research §综述硬约束。
#no-udp
