# AURA M5 — Android binderfs 固化 (part 1/3): autoload binder_linux at boot.
#
# Install to: /etc/modules-load.d/binder.conf
# systemd-modules-load.service reads this at boot and loads the module.
# The device table (binder,hwbinder,vndbinder) is supplied separately by
# /etc/modprobe.d/binder-options.conf so that mounting binderfs exposes the
# three /dev/binderfs/{binder,hwbinder,vndbinder} character devices.
#
# Kernel 6.8 (Ubuntu 24.04) ships binder_linux in linux-modules-extra; no DKMS.
binder_linux
