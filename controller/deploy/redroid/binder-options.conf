# AURA M5 — Android binderfs 固化 (part 2/3): binder_linux device table.
#
# Install to: /etc/modprobe.d/binder-options.conf
# `devices=` is read by binder_linux at load time; when binderfs is mounted at
# /dev/binderfs it pre-creates the listed device nodes. Redroid's image hardcodes
# the legacy /dev/binder{,hw,vnd} paths, which the pod bind-mounts from these nodes.
#
# NOTE: modules-load.d files can only list module names (no options), so the
# module parameter must live here in modprobe.d — hence this companion file.
options binder_linux devices=binder,hwbinder,vndbinder
